name: LINE Relay

on:
  workflow_dispatch:
    inputs:
      payload:
        required: true
        type: string

jobs:
  relay:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install puppeteer

      - name: Run relay
        env:
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: node relay.js
